                        {/* 1. STATISTIK DASHBOARD */}
                        <div className="no-print grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6 mb-8 lg:mb-10">
                          <div className="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm flex items-center gap-4 sm:gap-6 overflow-hidden">
                            <div className="bg-blue-50 dark:bg-blue-900/20 p-3 sm:p-4 rounded-3xl text-blue-600 shrink-0"><BarChart3 size={24}/></div>
                            <div className="min-w-0"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest truncate">Total Matkul</p><p className="text-xl sm:text-2xl font-black dark:text-white">{stats.totalMatkul}</p></div>
                          </div>
                          <div className="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm flex items-center gap-4 sm:gap-6 overflow-hidden">
                            <div className="bg-emerald-50 dark:bg-emerald-900/20 p-3 sm:p-4 rounded-3xl text-emerald-600 shrink-0"><Users2 size={24}/></div>
                            <div className="min-w-0"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest truncate">Dosen Aktif</p><p className="text-xl sm:text-2xl font-black dark:text-white">{stats.totalDosen}</p></div>
                          </div>
                          <div className="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm flex items-center gap-4 sm:gap-6 sm:col-span-2 lg:col-span-1 overflow-hidden">
                            <div className="bg-indigo-50 dark:bg-indigo-900/20 p-3 sm:p-4 rounded-3xl text-indigo-600 shrink-0"><Building2 size={24}/></div>
                            <div className="min-w-0"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest truncate">Ruang Aktif</p><p className="text-xl sm:text-2xl font-black dark:text-white">{stats.totalRuang}</p></div>
                          </div>
                        </div>

                        {/* --- PANEL MASTER PASSCODE CLOUD (COLLAPSIBLE) --- */}
                        {authorizedProdi === 'SUPER_ADMIN' && isSidebarOpen && (
                          <div className="px-4 mb-6 animate-in">
                            <div className="bg-amber-50 dark:bg-amber-900/10 border-2 border-dashed border-amber-200 dark:border-amber-800/50 p-4 rounded-[2rem] transition-all duration-300">
                              
                              {/* Header Panel (Toggle) */}
                              <button 
                                type="button"
                                onClick={() => setIsPasscodeExpanded(!isPasscodeExpanded)}
                                className="flex items-center justify-between w-full group focus:outline-none"
                              >
                                <div className="flex items-center gap-2">
                                  <div className="bg-amber-500 p-1.5 rounded-lg text-white shadow-sm">
                                    <Lock size={12} />
                                  </div>
                                  <span className="text-[9px] font-black text-amber-600 dark:text-amber-400 uppercase tracking-widest text-left">
                                    Cloud Passcodes
                                  </span>
                                </div>
                                <div className="text-amber-400 group-hover:text-amber-600">
                                  {isPasscodeExpanded ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
                                </div>
                              </button>
                              
                              {/* Konten Daftar Passcode */}
                              {isPasscodeExpanded && (
                                <div className="mt-4 space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-1 animate-in">
                                  {Object.entries(cloudPasscodeMap || {}).filter(([_, name]) => name !== 'SUPER_ADMIN').sort((a, b) => a[1].localeCompare(b[1])).map(([code, name]) => (
                                    <div key={code} className="bg-white dark:bg-slate-900 p-3 rounded-xl border border-amber-100 dark:border-amber-900/30 flex flex-col gap-1 group hover:border-amber-500 transition-all relative">
                                      <span className="text-[7px] font-black text-slate-400 uppercase truncate pr-10">{name}</span>
                                      <div className="flex items-center justify-between">
                                        <span className="text-[10px] font-black text-blue-600 dark:text-blue-400 tracking-tight">
                                          {code}
                                        </span>
                                        
                                        {/* Bagian Tombol Aksi */}
                                        <div className="flex gap-1 items-center relative z-[100]">
                                          <button 
                                            type="button"
                                            onClick={(e) => { 
                                              e.preventDefault();
                                              e.stopPropagation();
                                              navigator.clipboard.writeText(code); 
                                              setToast(`Salin: ${name}`); 
                                            }} 
                                            className="text-slate-300 hover:text-amber-600 p-1.5 rounded-md hover:bg-amber-50 dark:hover:bg-amber-900/20 transition-all pointer-events-auto"
                                            title="Salin"
                                          >
                                            <Copy size={12} />
                                          </button>
                                          <button 
                                            type="button"
                                            onClick={(e) => { 
                                              e.preventDefault();
                                              e.stopPropagation();
                                              setAdminEditData({ prodi: name, oldCode: code, newCode: '' }); 
                                              setShowAdminEditModal(true); 
                                            }} 
                                            className="text-slate-300 hover:text-blue-600 p-1.5 rounded-md hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all pointer-events-auto"
                                            title="Edit"
                                          >
                                            <Pencil size={12} />
                                          </button>
                                        </div>
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          </div>
                        )}

                        {/* 2. HEADER JUDUL & TOMBOL DASHBOARD */}
                        <div className="no-print mb-8 flex flex-col lg:flex-row lg:items-end justify-between gap-6">
                          <div className="min-w-0">
                            <div className="flex flex-wrap items-center gap-3">
                              <h2 className="text-xl sm:text-2xl lg:text-3xl font-black text-slate-800 dark:text-white tracking-tighter uppercase leading-none break-word-custom">{selectedProdi}</h2>
                              <span className="bg-blue-600 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase shadow-lg shadow-blue-500/20 whitespace-nowrap">
                                {searchTerm ? `${filteredSchedules.length} Hasil` : `${filteredSchedules.length} Matkul`}
                              </span>
                            </div>
                            <p className="text-slate-400 dark:text-slate-500 font-bold text-[10px] uppercase tracking-widest mt-2">Visualisasi Jadwal Cloud Real-time</p>
                          </div>
                          <div className="flex flex-wrap gap-2">
                            {authorizedProdi === 'SUPER_ADMIN' && (
                                <button onClick={handleClearAll} className="flex-1 lg:flex-none flex items-center justify-center gap-2 px-4 py-3 bg-red-50 dark:bg-red-900/20 text-red-600 rounded-2xl font-black text-[10px] uppercase shadow-sm hover:bg-red-600 hover:text-white transition-all"><Trash2 size={16} className="shrink-0"/> <span className="hidden sm:inline">Hapus Database</span><span className="sm:hidden">Reset</span></button>
                            )}
                            <button onClick={downloadExcel} className="flex-1 lg:flex-none flex items-center justify-center gap-2 px-4 py-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-2xl font-black text-[10px] uppercase shadow-sm hover:bg-slate-900 hover:text-white transition-all"><Download size={16} className="shrink-0"/> <span className="hidden sm:inline">Download Excel</span><span className="sm:hidden">Excel</span></button>
                            <button onClick={() => window.print()} className="flex-1 lg:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-slate-900 dark:bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg hover:opacity-90 transition-all"><Printer size={16} className="shrink-0"/> Cetak PDF</button>
                          </div>
                        </div>
                        
                        {/* TOMBOL SORTING & FILTER DASHBOARD */}
                        <div className="no-print flex flex-wrap gap-2 mb-8 pb-6 border-b dark:border-slate-800">
                          {[
                            { label: 'Hari', key: 'hari' },
                            { label: 'Matakuliah', key: 'matkul' },
                            { label: 'Dosen', key: 'dosen' },
                            { label: 'Ruangan', key: 'ruangan' }
                          ].map((btn) => (
                            <button
                              key={btn.key}
                              onClick={() => {
                                const direction = sortConfig.key === btn.key && sortConfig.direction === 'asc' ? 'desc' : 'asc';
                                setSortConfig({ key: btn.key, direction });
                              }}
                              className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 transition-all ${
                                sortConfig.key === btn.key 
                                ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' 
                                : 'bg-white dark:bg-slate-900 text-slate-500 border dark:border-slate-800 hover:bg-slate-50'
                              }`}
                            >
                              <ArrowUpDown size={12} />
                              {btn.label}
                              {sortConfig.key === btn.key && (
                                <span className="ml-1 opacity-60 text-[8px]">{sortConfig.direction === 'asc' ? '↑' : '↓'}</span>
                              )}
                            </button>
                          ))}
                        </div>
                        {/* 3. GRID KARTU JADWAL */}
                        <div className="no-print grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
                          {filteredSchedules.map((item) => (
                            <div key={item.id} className="bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2rem] p-5 lg:p-6 shadow-sm hover:shadow-2xl transition-all flex flex-col group relative overflow-hidden h-full">
                              <div className="mb-4">
                                <div className="flex justify-between items-start mb-3 gap-2">
                                  <span className="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-[10px] font-black px-2 py-1 rounded-lg uppercase whitespace-nowrap truncate max-w-[120px]">{item.kelas} • SMT {item.semester}</span>
                                  <span className="text-[10px] font-bold text-slate-300 dark:text-slate-600 uppercase tracking-tight shrink-0">{item.sks} SKS</span>
                                </div>
                                <h3 className="text-base lg:text-lg font-bold text-slate-800 dark:text-white leading-tight h-12 line-clamp-2 uppercase group-hover:text-blue-600 break-word-custom">{item.matkul}</h3>
                                <p className="text-[11px] font-black text-blue-500 dark:text-blue-400 mt-2 uppercase truncate break-word-custom">{item.dosen}</p>
                              </div>

                              {/* INDIKATOR PERUBAHAN (NOTIFIKASI) */}
                                {item.keterangan_rapat && item.keterangan_rapat !== "-" && item.keterangan_rapat !== "" && (
                                  <div className="mb-4 animate-bounce-subtle">
                                    <div className="bg-amber-50 dark:bg-amber-900/30 border border-amber-200 dark:border-amber-700 p-3 rounded-2xl flex items-start gap-3">
                                      <div className="bg-amber-500 p-1.5 rounded-lg text-white shrink-0 mt-0.5 shadow-sm">
                                        <AlertTriangle size={12} />
                                      </div>
                                      <div className="overflow-hidden">
                                        <p className="text-[9px] font-black text-amber-600 dark:text-amber-400 uppercase tracking-widest mb-1">
                                          Pembaruan Jadwal
                                        </p>
                                        <p className="text-[10px] font-bold text-slate-600 dark:text-slate-300 leading-tight italic">
                                          {item.keterangan_rapat}
                                        </p>
                                      </div>
                                    </div>
                                  </div>
                                )}
                              <div className="mt-auto bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-4 space-y-2 border border-transparent dark:border-slate-800/50">
                                <div className="flex items-center gap-3 text-[11px] font-bold text-slate-600 dark:text-slate-400 min-w-0"><Calendar size={13} className="text-blue-500 shrink-0" /><span className="truncate">{item.hari}, {item.waktu}</span></div>
                                <div className="flex items-center gap-3 text-[11px] font-bold text-slate-600 dark:text-slate-400 min-w-0"><MapPin size={13} className="text-indigo-500 shrink-0" /><span className="truncate">{item.ruangan}</span></div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {activeMenu === 'scanner' && (
                      <div className="animate-in space-y-6 sm:space-y-8">
                        <div className="bg-white dark:bg-slate-900 p-6 sm:p-10 rounded-[2.5rem] lg:rounded-[3.5rem] shadow-sm border dark:border-slate-800">
                          <h2 className="text-xl sm:text-2xl lg:text-3xl font-black text-slate-800 dark:text-white tracking-tight uppercase leading-none mb-8 break-word-custom">Cari Ruangan Kosong</h2>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
                            <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">Pilih Hari</label><select value={scanConfig.hari} onChange={(e) => setScanConfig({...scanConfig, hari: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-4 rounded-2xl font-bold dark:text-slate-200 outline-none text-sm appearance-none">{DAYS_ORDER.map(d => <option key={d} value={d}>{d}</option>)}</select></div>
                            <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase ml-2">Pilih Jam</label>
                              <select value={scanConfig.waktu} onChange={(e) => setScanConfig({...scanConfig, waktu: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-4 rounded-2xl font-bold dark:text-slate-200 outline-none text-sm appearance-none">
                                <option value="Semua Jam">Semua Jam Pelajaran</option>
                                {TIMES_SLOTS.map(t => <option key={t} value={t}>{t}</option>)}
                              </select>
                            </div>
                          </div>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8">
                          <div className="lg:col-span-1 space-y-6">
                            <div className="flex items-center justify-between px-4">
                               <h4 className="text-[11px] lg:text-sm font-black text-emerald-600 uppercase tracking-widest shrink-0">Tersedia ({scannerData.free.length})</h4>
                            </div>
                            <div className="grid grid-cols-1 gap-4 max-h-[500px] lg:max-h-[800px] overflow-y-auto pr-2 custom-scrollbar p-1">
                              {scannerData.free.length > 0 ? scannerData.free.map((item, idx) => (
                                <div key={idx} className="bg-white dark:bg-slate-900 border-2 border-emerald-50 dark:border-emerald-900/10 p-5 rounded-[2rem] flex items-center justify-between shadow-sm hover:border-emerald-500 transition-all gap-4 overflow-hidden">
                                  <div className="flex flex-col min-w-0"><p className="text-slate-800 dark:text-white font-black text-base lg:text-lg truncate">{item.room}</p><p className="text-[9px] font-black text-slate-400 uppercase truncate">{item.time}</p></div>
                                  <div className="inline-flex items-center gap-1.5 px-3 py-1 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 rounded-full text-[9px] font-black uppercase shrink-0">Bebas</div>
                                </div>
                              )) : <p className="text-[10px] font-black text-slate-400 text-center py-10 uppercase italic">Tidak ada ruang tersedia</p>}
                            </div>
                          </div>
                          <div className="lg:col-span-2 space-y-6">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between px-4 gap-4">
                                <h4 className="text-[11px] lg:text-sm font-black text-red-500 uppercase tracking-widest shrink-0">Terisi ({scannerData.occupied.length})</h4>
                                <div className="relative w-full sm:w-64"><Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={14} /><input type="text" placeholder="Cari ruangan atau prodi..." value={occupiedSearch} onChange={(e) => setOccupiedSearch(e.target.value)} className="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl pl-9 pr-3 py-2 text-[10px] font-bold outline-none" /></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[500px] lg:max-h-[800px] overflow-y-auto pr-2 custom-scrollbar p-1">
                              {scannerData.occupied.length > 0 ? scannerData.occupied.map((s, idx) => (
                                <div key={idx} className="bg-white dark:bg-slate-900 border dark:border-slate-800 p-5 rounded-2xl shadow-sm border-l-4 border-l-red-500 flex flex-col gap-2 overflow-hidden">
                                  <div className="flex justify-between items-start gap-4"><span className="text-[10px] lg:text-xs font-black text-slate-800 dark:text-white bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-lg uppercase truncate min-w-0">{s.ruangan}</span><span className="text-[8px] lg:text-[9px] font-black text-blue-600 uppercase bg-blue-50 dark:bg-blue-900/50 px-2 py-0.5 rounded-md truncate shrink-0">{s.prodi}</span></div>
                                  <p className="text-[11px] lg:text-xs font-bold text-slate-700 dark:text-slate-300 leading-tight uppercase line-clamp-1 break-word-custom">{s.matkul}</p>
                                  <div className="mt-auto pt-2 border-t dark:border-slate-800 flex justify-between items-center gap-4 min-w-0"><p className="text-[9px] lg:text-[10px] font-black text-slate-500 uppercase truncate min-w-0">{s.dosen}</p><p className="text-[8px] lg:text-[9px] font-black text-red-500 uppercase tracking-tight shrink-0">{s.waktu}</p></div>
                                </div>
                              )) : <p className="text-[10px] font-black text-slate-400 text-center py-10 uppercase italic">Tidak ada ruangan terisi</p>}
                            </div>
                          </div>
                        </div>
                      </div>
                    )}

                    {activeMenu === 'swap' && authorizedProdi && (
                      <div className="animate-in space-y-6">
                        <div className="bg-white dark:bg-slate-900 p-5 sm:p-8 rounded-[2.5rem] lg:rounded-[3.5rem] shadow-sm border dark:border-slate-800">
                          <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-8 pb-6 border-b dark:border-slate-800 gap-4">
                             <div className="flex items-center gap-4"><div className="bg-orange-500 p-3 rounded-2xl text-white shadow-lg shrink-0"><RefreshCw size={24} /></div><h2 className="text-xl lg:text-2xl font-black text-slate-800 dark:text-white uppercase leading-none break-word-custom">Manajemen Pertukaran</h2></div>
                             {swapMode !== 'menu' && (<button onClick={handleStepBack} className="flex items-center justify-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-xl text-[10px] sm:text-xs font-black uppercase shrink-0"><ArrowLeft size={16} /> Kembali</button>)}
                          </div>
                          {swapMode === 'menu' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                              {/* Tombol Swap (Tampil untuk semua yang login) */}
                              <button onClick={() => setSwapMode('advanced-swap')} className="group p-8 sm:p-10 bg-slate-50 dark:bg-slate-800 border-2 border-transparent hover:border-blue-500 rounded-[2.5rem] transition-all text-left flex flex-col items-start"><div className="bg-blue-600 w-12 h-12 lg:w-14 lg:h-14 rounded-2xl flex items-center justify-center text-white mb-6 shadow-xl shrink-0"><ArrowRightLeft size={24} /></div><h3 className="text-lg lg:text-xl font-black text-slate-800 dark:text-white uppercase leading-tight">Advanced Swap</h3><p className="text-[10px] lg:text-xs font-bold text-slate-500 mt-2 leading-relaxed">Menukar satu jadwal dengan jadwal lain secara otomatis.</p></button>

                              {/* Poin 2: Filter Menu Move Hanya untuk Super Admin */}
                              {authorizedProdi === 'SUPER_ADMIN' ? (
                                <button onClick={() => setSwapMode('move')} className="group p-8 sm:p-10 bg-slate-50 dark:bg-slate-800 border-2 border-transparent hover:border-emerald-500 rounded-[2.5rem] transition-all text-left flex flex-col items-start"><div className="bg-emerald-600 w-12 h-12 lg:w-14 lg:h-14 rounded-2xl flex items-center justify-center text-white mb-6 shadow-xl shrink-0"><FileUp size={24} /></div><h3 className="text-lg lg:text-xl font-black text-slate-800 dark:text-white uppercase leading-tight">Move to Empty Slot</h3><p className="text-[10px] lg:text-xs font-bold text-slate-500 mt-2 leading-relaxed">Memindahkan jadwal ke slot hari yang benar-benar kosong.</p></button>
                              ) : (
                                <div className="p-8 sm:p-10 bg-slate-50 dark:bg-slate-900 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-[2.5rem] opacity-40 flex flex-col items-center justify-center text-center">
                                  <Lock size={24} className="mb-4 text-slate-400" />
                                  <h3 className="text-xs font-black uppercase text-slate-400">Pindah Slot Terkunci</h3>
                                  <p className="text-[9px] font-bold text-slate-400 mt-1 uppercase">Hubungi Super Admin untuk akses ini</p>
                                </div>
                              )}
                            </div>
                          )}
                          {swapMode !== 'menu' && (
                            <div className="space-y-8 animate-in">
                              <div className="flex items-center gap-4 lg:gap-6 px-1 overflow-x-auto pb-4 custom-scrollbar snap-x no-print">
                                {[
                                  { s: 1, label: "Pilih Dosen", val: swapStep > 1 ? swapDosenAsal : null }, 
                                  { s: 2, label: "Matkul Asal", val: swapStep > 2 ? `${swapMatkulAsal?.matkul}` : null }, 
                                  { s: 3, label: swapMode === 'advanced-swap' ? "Matkul Swap" : "Slot Kosong" }
                                ].map((step) => (
                                  <div key={step.s} className="flex flex-col gap-1 min-w-[140px] shrink-0 snap-start">
                                    <div className="flex items-center gap-2">
                                      <div className={`w-7 h-7 lg:w-8 lg:h-8 rounded-full flex items-center justify-center text-[10px] font-black transition-all shrink-0 ${swapStep >= step.s ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>{step.s}</div>
                                      <span className={`text-[9px] font-black uppercase tracking-widest truncate ${swapStep === step.s ? 'text-blue-600' : 'text-slate-400'}`}>{step.label}</span>
                                    </div>
                                    {step.val && (
                                      <div className="ml-9 lg:ml-10 text-[9px] lg:text-[10px] font-bold text-blue-500 dark:text-blue-400 uppercase tracking-tighter truncate max-w-[120px] lg:max-w-[180px] animate-in">
                                        {step.val}
                                      </div>
                                    )}
                                  </div>
                                ))}
                              </div>
                              {swapStep === 1 && (
                                <div className="animate-in grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar p-1">
                                  {[...new Set(schedules.filter(s => s.prodi === selectedProdi).map(s => s.dosen))].sort().map(dosen => (
                                    <button 
                                      key={dosen} 
                                      onClick={() => { setSwapDosenAsal(dosen); setSwapStep(2); }} 
                                      className="p-5 bg-slate-50 dark:bg-slate-800 border dark:border-slate-800 rounded-2xl sm:rounded-3xl text-left hover:border-blue-500 transition-all uppercase text-[10px] lg:text-xs font-black overflow-hidden truncate h-full"
                                    >
                                      {dosen}
                                    </button>
                                  ))}
                                </div>
                              )}
                              {swapStep === 2 && (
                                <div className="animate-in grid grid-cols-1 md:grid-cols-2 gap-4">
                                  {sortSchedulesByDay(schedules.filter(s => s.dosen === swapDosenAsal && (authorizedProdi === 'SUPER_ADMIN' ? true : s.prodi === authorizedProdi))).map(item => (
                                    <button key={item.id} onClick={() => { setSwapMatkulAsal(item); setSwapStep(3); }} className="p-6 sm:p-8 bg-white dark:bg-slate-800 border-2 border-transparent hover:border-blue-500 rounded-[2rem] shadow-sm text-left group overflow-hidden flex flex-col h-full">
                                      <div className="flex justify-between mb-2 gap-4 overflow-hidden">
                                        <span className="text-[9px] lg:text-[10px] font-black text-blue-600 bg-blue-50 dark:bg-blue-900/40 px-2 py-0.5 rounded-md uppercase truncate shrink min-w-0">{item.hari} • {item.kelas}</span>
                                        <span className="text-[9px] lg:text-[10px] font-black text-violet-600 whitespace-nowrap shrink-0">{item.sks} SKS</span>
                                      </div>
                                      <h5 className="font-black text-slate-800 dark:text-white text-sm lg:text-base leading-tight uppercase group-hover:text-blue-600 line-clamp-2 break-word-custom">{item.matkul}</h5>
                                      <div className="mt-4 text-[10px] lg:text-[11px] font-bold text-slate-400 uppercase tracking-tight flex items-center gap-4 truncate">
                                        <span className="shrink-0">{item.waktu}</span>
                                        <span className="bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-lg truncate shrink min-w-0">R: {item.ruangan}</span>
                                      </div>
                                    </button>
                                  ))}
                                </div>
                              )}
                              {swapStep === 3 && (
                                <div className="animate-in space-y-8">
                                  {/* 1. Input Alasan (Tampil untuk Move & Swap) */}
                                  <div className="p-5 lg:p-6 bg-white dark:bg-slate-900 rounded-[2.5rem] border-2 border-slate-200 dark:border-slate-800">
                                    <p className="text-[9px] font-black text-blue-600 uppercase mb-2">Berita Acara / Alasan:</p>
                                    <textarea 
                                      rows="2" 
                                      value={swapReason} 
                                      onChange={(e) => setSwapReason(e.target.value)} 
                                      placeholder="Isi alasan perubahan jadwal..." 
                                      className="w-full bg-slate-50 dark:bg-slate-800 border-none p-4 rounded-2xl text-[10px] font-bold outline-none dark:text-white" 
                                    />
                                  </div>

                                  {/* 2. Filter Hari (Muncul untuk Move & Swap) */}
                                  <div className="flex flex-wrap gap-2 justify-center mb-6">
                                    {swapMode === 'advanced-swap' && (
                                      <button 
                                        onClick={() => setSwapDayFilter('Semua')}
                                        className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${swapDayFilter === 'Semua' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}
                                      >
                                        Semua
                                      </button>
                                    )}
                                    {DAYS_ORDER.map(day => (
                                      <button 
                                        key={day} 
                                        type="button"
                                        onClick={() => {
                                          if(swapMode === 'move') setSwapTargetDay(day);
                                          setSwapDayFilter(day);
                                        }}
                                        className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${(swapMode === 'move' ? swapTargetDay === day : swapDayFilter === day) ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}
                                      >
                                        {day}
                                      </button>
                                    ))}
                                  </div>

                                  {/* 3. Area Konten Berdasarkan Mode */}
                                  {swapMode === 'move' ? (
                                    /* --- TAMPILAN MOVE TO EMPTY (FIXED) --- */
                                    <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-3 max-h-96 overflow-y-auto p-1 custom-scrollbar">
                                      {moveOptions.length > 0 ? moveOptions.map((opt, i) => (
                                        <button 
                                          key={i} 
                                          type="button"
                                          disabled={!swapReason.trim()} 
                                          onClick={() => executeMove(opt)} 
                                          className="p-4 bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-3xl text-center shadow-sm hover:border-emerald-500 disabled:opacity-30 transition-all group"
                                        >
                                          <p className="text-[8px] font-black text-slate-400 mb-1 group-hover:text-emerald-500 uppercase">{opt.waktu}</p>
                                          <p className="text-sm font-black text-slate-800 dark:text-white uppercase truncate">R. {opt.ruangan}</p>
                                        </button>
                                      )) : (
                                        <div className="col-span-full py-10 text-center opacity-30 text-[10px] font-black uppercase italic">
                                          Tidak ada slot kosong pada hari {swapTargetDay}
                                        </div>
                                      )}
                                    </div>
                                  ) : (
                                    /* --- MENU ADVANCED SWAP (RESTORED INFO SKS) --- */
                                    <div className="space-y-6">
                                    {swapMode === 'advanced-swap' ? (
                                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {swapSafeCandidates.length > 0 ? swapSafeCandidates.map(target => {
                                          const isDiffSks = target.sks !== swapMatkulAsal.sks;
                                          return (
                                            <button key={target.id} disabled={!swapReason.trim()} onClick={() => executeSwap(target)} className={`p-5 sm:p-6 bg-white dark:bg-slate-900 border-2 ${isDiffSks ? 'border-amber-200 dark:border-amber-900/40' : 'border-emerald-50'} hover:border-emerald-500 rounded-[1.75rem] lg:rounded-[2rem] text-left transition-all disabled:opacity-30 group shadow-sm overflow-hidden flex flex-col h-full`}>
                                              <div className="flex justify-between items-start mb-2 gap-4 overflow-hidden">
                                                <div className="flex flex-wrap gap-1 overflow-hidden">
                                                  <span className="text-[9px] lg:text-[10px] font-black text-blue-600 bg-blue-50 dark:bg-blue-900/40 px-2 py-0.5 rounded-md uppercase truncate shrink min-w-0">{target.hari} • {target.kelas}</span>
                                                  {isDiffSks && <span className="text-[8px] font-black text-amber-600 bg-amber-50 px-2 py-0.5 rounded-md uppercase ring-1 ring-amber-200 shrink-0">BEDA SKS</span>}
                                                </div>
                                                <span className="text-[9px] font-bold text-slate-400 uppercase whitespace-nowrap shrink-0">{target.sks} SKS</span>
                                              </div>
                                              <h5 className="font-black text-slate-800 dark:text-white text-xs lg:text-sm uppercase leading-tight group-hover:text-emerald-600 line-clamp-1 break-word-custom">{target.matkul}</h5>
                                              <p className="text-[9px] lg:text-[10px] font-bold text-slate-500 mt-0.5 truncate">{target.dosen}</p>
                                              <div className="mt-auto pt-4 border-t dark:border-slate-800 text-[9px] lg:text-[10px] font-black text-slate-400 uppercase truncate">
                                                {target.waktu} <span className="text-slate-300 mx-1">|</span> [{target.ruangan}]
                                              </div>
                                            </button>
                                          )
                                        }) : (
                                          <div className="col-span-full py-10 text-center opacity-40 uppercase font-black text-[10px] italic tracking-widest">Tidak ada kandidat swap yang aman</div>
                                        )}
                                      </div>
                                    ) : (
                                      <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-3 max-h-96 overflow-y-auto pr-2 custom-scrollbar p-1">
                                        {moveOptions.map((opt, i) => (
                                        <button 
                                          key={i} 
                                          disabled={!swapReason.trim()} 
                                          onClick={() => executeMove(opt)} 
                                          className="p-3 sm:p-4 bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-2xl sm:rounded-3xl text-center shadow-sm hover:border-emerald-500 disabled:opacity-30 transition-all group relative overflow-hidden h-full flex flex-col justify-between"
                                        >
                                          <p className="text-[8px] lg:text-[9px] font-black text-slate-400 mb-1 group-hover:text-emerald-500 uppercase truncate shrink-0">{opt.waktu}</p>
                                          <p className="text-xs sm:text-sm font-black text-slate-800 dark:text-white uppercase truncate px-1 shrink min-w-0">{opt.ruangan}</p>
                                          <div className="mt-2 pt-2 border-t border-dashed border-slate-100 dark:border-slate-800 shrink-0">
                                            <span className="text-[7px] lg:text-[8px] font-black text-blue-500 uppercase bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded-md truncate">
                                              {swapMatkulAsal?.sks || 0} SKS
                                            </span>
                                          </div>
                                        </button>
                                        ))}
                                      </div>
                                    )}
                                  </div>
                                  )}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      </div>
                    )}

                    {activeMenu === 'history' && (
                      <div className="animate-in space-y-6">
                        <div className="bg-white dark:bg-slate-900 p-6 lg:p-10 rounded-[2.5rem] lg:rounded-[3.5rem] shadow-sm border dark:border-slate-800 overflow-hidden">
                             <div className="flex flex-col lg:flex-row lg:items-center justify-between mb-10 pb-8 border-b dark:border-slate-800 gap-6">
                                <div className="flex items-center gap-4 sm:gap-5 overflow-hidden">
                                  <div className="bg-blue-600 p-3 sm:p-4 rounded-2xl sm:rounded-3xl text-white shadow-xl shadow-blue-500/30 shrink-0"><FileText size={28} /></div>
                                  <div className="min-w-0">
                                    <h2 className="text-xl sm:text-2xl lg:text-3xl font-black text-slate-800 dark:text-white uppercase leading-none truncate break-word-custom">Berita Acara</h2>
                                    <p className="text-slate-500 font-bold text-[9px] lg:text-[10px] uppercase mt-2 truncate">Log Audit Sinkronisasi Awan</p>
                                  </div>
                                </div>
                             </div>
                             <div className="space-y-6">
                              <div className="flex flex-wrap gap-2 mb-6">
                                <button 
                                  onClick={handleSelectAllHistory}
                                  className="flex items-center justify-center gap-2 px-4 py-3 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-2xl font-black text-[9px] lg:text-[10px] uppercase border border-blue-100 dark:border-blue-800 hover:bg-blue-600 hover:text-white transition-all shrink-0"
                                >
                                  {selectedHistoryIds.length === historyLog.filter(l => authorizedProdi === 'SUPER_ADMIN' || l.prodi === authorizedProdi).length && selectedHistoryIds.length > 0
                                    ? "Lepas Semua" 
                                    : "Pilih Semua"}
                                </button>
                                
                                  {/* Tombol Batal Pilih & Undo di bawah ini tetap menggunakan kodingan lama Anda agar tidak double */}
                                  {selectedHistoryIds.length > 0 && (
                                    <>
                                      <button 
                                        onClick={() => setSelectedHistoryIds([])} 
                                        className="flex items-center justify-center gap-2 px-4 py-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-2xl font-black text-[9px] lg:text-[10px] uppercase transition-all shrink-0"
                                      >
                                        <XCircle size={14} /> Batal Pilih
                                      </button>
                                      
                                      <button 
                                        onClick={executeMultiUndo} 
                                        className="flex items-center justify-center gap-2 px-5 py-3 bg-red-600 text-white rounded-2xl font-black text-[9px] lg:text-[10px] uppercase shadow-xl transition-all shrink-0"
                                      >
                                        <RotateCcw size={14} /> Undo {selectedHistoryIds.length} Data
                                      </button>
                                    </>
                                  )}
                              </div>
                               {historyLog.length > 0 ? historyLog.map((log) => (
                                 <div key={log.id} className={`relative bg-slate-50 dark:bg-slate-800/20 border-2 p-6 lg:p-8 rounded-[2.5rem] lg:rounded-[3rem] transition-all group overflow-hidden ${(authorizedProdi === 'SUPER_ADMIN' || authorizedProdi === log.prodi) && selectedHistoryIds.includes(log.id) ? 'border-blue-600 ring-4 ring-blue-600/10' : 'border-transparent hover:border-blue-400'}`}>
                                   <div className="flex flex-col gap-6 overflow-hidden">
                                     <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 overflow-hidden">
                                       <div className="flex flex-wrap items-center gap-3 min-w-0">
                                         {(authorizedProdi === 'SUPER_ADMIN' || authorizedProdi === log.prodi) && (
                                           <button onClick={() => toggleHistorySelection(log.id)} className={`w-8 h-8 rounded-xl flex items-center justify-center transition-all shrink-0 ${selectedHistoryIds.includes(log.id) ? 'bg-blue-600 text-white shadow-md' : 'bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-slate-300'}`}>
                                              {selectedHistoryIds.includes(log.id) ? <CheckSquare size={16} /> : <Square size={16} />}
                                           </button>
                                         )}
                                         <span className={`px-3 py-1.5 rounded-xl text-[9px] font-black uppercase shadow-sm shrink-0 ${log.type === 'SWAP' ? 'bg-orange-600 text-white' : 'bg-emerald-600 text-white'}`}>{log.type}</span>
                                         <span className="px-3 py-1.5 bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 rounded-xl text-[9px] font-black uppercase tracking-tight truncate min-w-0">{log.prodi}</span>
                                       </div>
                                       <div className="md:text-right shrink-0"><p className="text-[8px] font-black text-slate-400 uppercase">{log.timestamp}</p><p className="text-[11px] lg:text-xs font-black text-slate-800 dark:text-white uppercase truncate">Oleh: {log.admin}</p></div>
                                     </div>
                                     <div className="bg-white dark:bg-slate-900 p-5 rounded-[1.75rem] border dark:border-slate-800 shadow-inner overflow-hidden">
                                       <p className="text-[9px] font-black text-blue-600 uppercase mb-1 truncate">Berita Acara / Alasan:</p>
                                       <p className="text-xs lg:text-sm font-bold text-slate-700 dark:text-slate-300 italic leading-relaxed break-word-custom">"{log.reason}"</p>
                                     </div>
                                     <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                      {log.affected.map((aff, i) => (
                                        <div key={i} className="bg-white dark:bg-slate-900 p-4 lg:p-5 rounded-[1.75rem] lg:rounded-[2rem] border dark:border-slate-800 shadow-sm overflow-hidden h-full flex flex-col">
                                          <h4 className="text-[10px] lg:text-xs font-black uppercase text-blue-600 mb-4 truncate break-word-custom">{aff.matkul}</h4>
                                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 flex-1">
                                            <div className="space-y-1 opacity-50 overflow-hidden">
                                              <p className="text-[7px] lg:text-[8px] font-black uppercase text-slate-400 truncate">Kondisi Asal</p>
                                              <p className="text-[9px] lg:text-[10px] font-black leading-tight line-clamp-1 truncate">{aff.before.dosen}</p>
                                              <p className="text-[9px] lg:text-[10px] font-bold whitespace-nowrap truncate">{aff.before.hari}, {aff.before.waktu}</p>
                                              <p className="text-[8px] lg:text-[9px] font-black uppercase truncate">R: {aff.before.ruangan} • Kls: {aff.after.kelas}</p>
                                            </div>
                                            <div className="space-y-1 overflow-hidden border-t sm:border-t-0 sm:border-l sm:pl-4 dark:border-slate-800 pt-3 sm:pt-0">
                                              <p className="text-[7px] lg:text-[8px] font-black uppercase text-emerald-500 truncate">Kondisi Baru</p>
                                              <p className="text-[9px] lg:text-[10px] font-black leading-tight line-clamp-1 truncate">{aff.after.dosen}</p>
                                              <p className="text-[9px] lg:text-[10px] font-black text-emerald-600 whitespace-nowrap truncate">{aff.after.hari}, {aff.after.waktu}</p>
                                              <p className="text-[8px] lg:text-[9px] font-black uppercase text-emerald-500/70 truncate">R: {aff.after.ruangan} • Kls: {aff.after.kelas}</p>
                                            </div>
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                     {(authorizedProdi === 'SUPER_ADMIN' || authorizedProdi === log.prodi) && !selectedHistoryIds.includes(log.id) && (
                                        <button onClick={() => undoAction(log.id)} className="w-full sm:w-fit flex items-center justify-center gap-2 px-6 py-2.5 bg-red-50 hover:bg-red-600 text-red-600 hover:text-white rounded-xl text-[9px] font-black uppercase transition-all shadow-sm shrink-0">Batalkan Perubahan Ini</button>
                                     )}
                                   </div>
                                 </div>
                               )) : <p className="text-[10px] font-black text-slate-400 text-center py-10 uppercase italic">Belum ada riwayat perubahan</p>}
                             </div>
                        </div>
                      </div>
                    )}

                    <div className="print-only">
                        <div style={{textAlign: 'center', marginBottom: '30px', borderBottom: '2px solid #000', paddingBottom: '15px'}}>
                           <div style={{fontSize: '18pt', fontWeight: '900', textTransform: 'uppercase', marginBottom: '5px'}}>{searchTerm ? `JADWAL ${searchTerm.toUpperCase()}` : `JADWAL KULIAH`}</div>
                           <div style={{fontSize: '10pt', color: '#000', fontWeight: 'bold'}}>{selectedProdi.toUpperCase()}</div>
                           <div style={{fontSize: '10pt', color: '#000', fontWeight: 'bold'}}>SEMESTER GENAP 25/26</div>
                           <div style={{fontSize: '10pt', color: '#000', fontWeight: 'bold'}}>UNIVERSITAS MUHAMMADIYAH BANDUNG</div>
                           <div style={{fontSize: '8pt', color: '#000'}}>Notulis: {adminName} | Dicetak: {new Date().toLocaleString('id-ID')}</div>
                        </div>
                        <div className="space-y-8">
                          {DAYS_ORDER.map(day => {
                            const daySchedules = filteredSchedules.filter(s => s.hari.trim().toLowerCase() === day.toLowerCase()).sort((a, b) => a.waktu.localeCompare(b.waktu));
                            if (daySchedules.length === 0) return null;
                            return (<div key={day} className="day-section"><h3 style={{fontSize: '11pt', fontWeight: 'bold', marginBottom: '8px', paddingLeft: '8px', borderLeft: '4px solid #000'}}>{day.toUpperCase()}</h3><table className="w-full"><thead><tr><th style={{width: '15%'}}>WAKTU</th><th style={{width: '35%'}}>MATAKULIAH</th><th style={{width: '25%'}}>DOSEN</th><th style={{width: '8%', textAlign: 'center'}}>KLS</th><th style={{width: '12%', textAlign: 'center'}}>RUANG</th></tr></thead><tbody>{daySchedules.map((item) => (<tr key={item.id}><td style={{fontWeight: 'bold'}}>{item.waktu}</td><td><div style={{fontWeight: 'bold', fontSize: '8.5pt'}}>{item.matkul.toUpperCase()}</div><div style={{fontSize: '7pt'}}>Semester {item.semester} • {item.sks} SKS</div></td><td style={{fontSize: '7.5pt'}}>{item.dosen.toUpperCase()}</td><td style={{textAlign: 'center'}}>{item.kelas}</td><td style={{textAlign: 'center', fontWeight: 'bold'}}>{item.ruangan}</td></tr>))}</tbody></table></div>);
                          })}
                        </div>
                        {/* MODAL ADMIN EDIT PASSCODE PRODI */}
                        {showAdminEditModal && (
                          <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-md animate-in">
                            <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 border dark:border-slate-800 animate-scale-in">
                              <div className="text-center mb-6">
                                <div className="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center text-white mx-auto mb-4"><UserCog size={24} /></div>
                                <h3 className="text-lg font-black text-slate-800 dark:text-white uppercase leading-tight">Edit Passcode</h3>
                                <p className="text-[10px] font-bold text-blue-500 uppercase mt-2">{adminEditData.prodi}</p>
                              </div>
                              <div className="space-y-4">
                                <div>
                                  <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Passcode Baru</label>
                                  <input type="text" value={adminEditData.newCode} onChange={(e) => setAdminEditData({...adminEditData, newCode: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl font-bold dark:text-white outline-none border dark:border-slate-700" placeholder="Min. 4 Karakter" autoFocus />
                                </div>
                                <div className="flex gap-2 pt-4">
                                  <button onClick={() => setShowAdminEditModal(false)} className="flex-1 py-3.5 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded-xl font-black text-[10px] uppercase">Batal</button>
                                  <button onClick={handleAdminUpdatePasscode} className="flex-1 py-3.5 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg">Update</button>
                                </div>
                              </div>
                            </div>
                          </div>
                        )}
                    </div>
                  </>
                )}
              </div>
            </main>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
