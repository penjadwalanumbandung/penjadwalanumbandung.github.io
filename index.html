<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <title>Jadwal UMB UI - Versi Final 1 (Cloud Edition)</title>
  <script src="https://cdn.tailwindcss.com"></script>

    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    @keyframes bounce-subtle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }

      animation: bounce-subtle 2s infinite ease-in-out;

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce-slow { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-in { animation: fadeIn 400ms ease-out both; }
    .animate-bounce-slow { animation: bounce-slow 2s infinite; }
    .animate-scale-in { animation: scaleIn 200ms ease-out both; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }

    /* Fix for clashing text */
    .break-word-custom { word-break: break-word; overflow-wrap: break-word; }

    @media print {
      @page { size: A4 portrait; margin: 10mm; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; overflow: visible !important; }
      .main-content { padding: 0 !important; margin: 0 !important; overflow: visible !important; display: block !important; }
      .day-section { page-break-inside: avoid; break-inside: avoid; margin-bottom: 2rem; border-bottom: 1px solid #000; padding-bottom: 1rem; }
      table { width: 100% !important; border-collapse: collapse !important; table-layout: auto !important; border: 1.5px solid #000 !important; }
      th, td { border: 1px solid #000 !important; padding: 6px 4px !important; text-align: left; font-size: 8pt !important; color: black !important; vertical-align: top; }
      th { background-color: #f3f4f6 !important; font-weight: bold !important; text-transform: uppercase; }
      tr { page-break-inside: avoid; break-inside: avoid; }
    }
    .print-only { display: none; }
    .drag-active { border: 4px dashed #3b82f6 !important; background-color: rgba(59, 130, 246, 0.05) !important; }
  </style>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // --- FIREBASE INTEGRATION ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    import React, { useState, useEffect, useMemo, useCallback, useRef } from 'react';
    import ReactDOM from 'react-dom/client';
    import { 
      LayoutDashboard, RefreshCw, Search, Menu, X, UserCog, Check,
      ChevronRight, Database, MapPin, Calendar, Clock, FileUp, Trash2,
      SortAsc, SortDesc, ArrowUpDown, Download, Printer, SearchCode, 
      FileText, Ban, ArrowRightLeft, Moon, Sun, ArrowLeft, Info, History, 
      RotateCcw, AlertCircle, BellRing, User, ArrowUp, HelpCircle, 
      ExternalLink, AlertTriangle, UploadCloud, Square, CheckSquare, 
      XCircle, Layers, Lock, Unlock, LogOut, Wifi, WifiOff, BarChart3, 
      Users2, Building2, Copy, ChevronDown, ChevronUp, Pencil, 
      SortAsc as SortIcon // Alias untuk ikon sort
    } from 'lucide-react';

    // --- GLOBAL SAFETY CONFIG ---
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'penjadwalanumbandung';
    let firebaseConfig = {
      apiKey: "AIzaSyCzotVg7p83NdFvABApRIH8UEDX_oZt1tY",
      authDomain: "penjadwalanumbandung.firebaseapp.com",
      projectId: "penjadwalanumbandung",
      storageBucket: "penjadwalanumbandung.firebasestorage.app",
      messagingSenderId: "849571464773",
      appId: "1:849571464773:web:cd15f1f9edc10920b8452c",
      measurementId: "G-XBTL91MRPZ"
    };
    
    try {
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        firebaseConfig = JSON.parse(__firebase_config);
      }
    } catch (e) {
      console.warn("Using default manual config.");
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const DAYS_ORDER = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
    const TIMES_SLOTS = [
      "07:00-08:40", "07:00-09:30", "08:50-10:30", "09:40-12:10", 
      "10:40-12:20", "13:00-14:40", "13:00-15:30", "14:50-16:30", 
      "15:40-18:10", "16:40-18:20", "18:20-20:50", "18:30-20:10"
    ];

    const THEME_KEY = "umb_theme_dark_vfinal_1";
    const PRODI_KEY = "umb_last_prodi_vfinal_1";
    const AUTH_SESSION_KEY = "umb_auth_prodi_session";

    const sortSchedulesByDay = (list, direction = 'asc') => {
      return [...list].sort((a, b) => {
        const dayAStr = (a.hari || "").trim();
        const dayBStr = (b.hari || "").trim();
        let dayA = DAYS_ORDER.findIndex(d => d.toLowerCase() === dayAStr.toLowerCase());
        let dayB = DAYS_ORDER.findIndex(d => d.toLowerCase() === dayBStr.toLowerCase());
        if (dayA === -1) dayA = 99;
        if (dayB === -1) dayB = 99;
        if (dayA !== dayB) return direction === 'asc' ? dayA - dayB : dayB - dayA;
        return (a.waktu || "").localeCompare(b.waktu || "");
      });
    };

    const parseTimeToMinutes = (timeStr) => {
      if (!timeStr) return null;
      const clean = timeStr.trim().replace(/\./g, ':').replace(/\s/g, '');
      if (!clean.includes(':')) return null;
      try {
        const parts = clean.split(':');
        const h = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10);
        if (isNaN(h) || isNaN(m)) return null; 
        return (h * 60) + m;
      } catch(e) { return null; }
    };

    const getSlotRange = (slotStr) => {
      if (!slotStr) return null;
      const separator = slotStr.includes('-') ? '-' : (slotStr.includes('~') ? '~' : null);
      if (!separator) return null;
      
      const parts = slotStr.split(separator);
      const start = parseTimeToMinutes(parts[0]);
      const end = parseTimeToMinutes(parts[1]);
      return (start === null || end === null) ? null : { start, end };
    };

    const isOverlap = (rangeA, rangeB) => {
      if (!rangeA || !rangeB) return false;
      return Math.max(rangeA.start, rangeB.start) < Math.min(rangeA.end, rangeB.end);
    };

    function App() {
      const [user, setUser] = useState(null);
      const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem(THEME_KEY) === 'true');
      const [authorizedProdi, setAuthorizedProdi] = useState(() => sessionStorage.getItem(AUTH_SESSION_KEY) || null); 
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [activeMenu, setActiveMenu] = useState('dashboard');
      const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth > 1024);
      const [schedules, setSchedules] = useState([]);
      const [historyLog, setHistoryLog] = useState([]);
      const [isLoadingData, setIsLoadingData] = useState(true);
      // State untuk panel sidebar
      const [isPasscodeExpanded, setIsPasscodeExpanded] = useState(false);

      // State untuk modal edit passcode Admin
      const [showAdminEditModal, setShowAdminEditModal] = useState(false);
      const [adminEditData, setAdminEditData] = useState({ prodi: '', oldCode: '', newCode: '' });
      const [selectedProdi, setSelectedProdi] = useState(() => localStorage.getItem(PRODI_KEY) || '');
      const [searchTerm, setSearchTerm] = useState('');
      const [occupiedSearch, setOccupiedSearch] = useState('');
      const [adminName, setAdminName] = useState(localStorage.getItem('umb_admin_name') || 'Kaprodi');
      const [scanConfig, setScanConfig] = useState({ hari: 'Senin', waktu: '07:00-09:30' });
      const [sortConfig, setSortConfig] = useState({ key: 'hari', direction: 'asc' });
      const [toast, setToast] = useState(null);
      const [cloudPasscodeMap, setCloudPasscodeMap] = useState(null);
      const [showPasswordModal, setShowPasswordModal] = useState(false);
      const [newPasscodeData, setNewPasscodeData] = useState({ old: '', new: '' });
      const [isConfigLoading, setIsConfigLoading] = useState(true);
      const [dragActive, setDragActive] = useState(false);
      const [selectedHistoryIds, setSelectedHistoryIds] = useState([]);
      
      const [swapMode, setSwapMode] = useState('menu'); 
      const [swapStep, setSwapStep] = useState(1);
      const [swapDosenAsal, setSwapDosenAsal] = useState(null);
      const [swapMatkulAsal, setSwapMatkulAsal] = useState(null);
      const [swapTargetDay, setSwapTargetDay] = useState('Senin');
      const [swapReason, setSwapReason] = useState('');
      const [swapDayFilter, setSwapDayFilter] = useState('Semua'); 
      
      const [confirmDialog, setConfirmDialog] = useState({ open: false, title: '', message: '', onConfirm: null });
      const [loginModal, setLoginModal] = useState({ open: false, passcode: '', error: '' });

      // State untuk menghitung total jadwal yang tersimpan di Cloud
      const [totalCloudData, setTotalCloudData] = useState(0);

      // State untuk memantau apakah database sedang sinkron atau tidak
      const [syncStatus, setSyncStatus] = useState('Terhubung'); 

      const fileInputRef = useRef(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [formData, setFormData] = useState({
        kode_matkul: '',
        matkul: '',
        sks: '2',
        semester: '2',
        dosen: '',
        hari: 'Senin',
        waktu: '07:00-08:40',
        kelas: '',
        ruangan: '',
        prodi: '', 
        fakultas: '',
        keterangan: 'Reguler'
      });

      

      // --- INITIAL AUTH ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            console.log("Starting Auth...");
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth init silent fail:", e);
            setIsLoadingData(false);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          console.log("Firebase Auth State:", u ? "Authenticated" : "Not Authenticated");
          setUser(u);
        });

        const handleOnline = () => setIsOnline(true);
        const handleOffline = () => setIsOnline(false);
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);

        return () => {
          unsubscribe();
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      // --- FIRESTORE REAL-TIME SYNC (FIXED & COMPLETE) ---
      useEffect(() => {
        if (!user) return; // Tunggu sampai login anonim Firebase selesai

        setIsLoadingData(true);
        if (typeof setSyncStatus === 'function') setSyncStatus('Sinkronisasi...');
        
        // 1. Path Konfigurasi Passcode
        const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'passcodes');
        
        // 2. Path Koleksi Jadwal
        const schedulesCol = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');

        // 3. Path Koleksi Riwayat & BAP
        const historyCol = collection(db, 'artifacts', appId, 'public', 'data', 'history');

        // --- Listener Config (Passcode) ---
        const unsubConfig = onSnapshot(configRef, (docSnap) => {
          if (docSnap.exists()) {
            setCloudPasscodeMap(docSnap.data().map);
          } else {
            setCloudPasscodeMap({}); 
          }
          if (typeof setIsConfigLoading === 'function') setIsConfigLoading(false);
        }, (err) => {
          console.error("Config Error:", err);
          if (typeof setIsConfigLoading === 'function') setIsConfigLoading(false);
        });

        // --- Listener Jadwal (Schedules) ---
        const unsubSchedules = onSnapshot(schedulesCol, (snapshot) => {
          const data = snapshot.docs.map(doc => doc.data());
          setSchedules(data);
          
          setIsLoadingData(false); 
          if (typeof setTotalCloudData === 'function') setTotalCloudData(snapshot.size);
          if (typeof setSyncStatus === 'function') setSyncStatus('Sinkron');
        }, (err) => {
          console.error("Schedules Error:", err);
          setIsLoadingData(false);
          if (typeof setSyncStatus === 'function') setSyncStatus('Error');
        });

        // --- Listener Riwayat & BAP (TAMBAHKAN INI) ---
        const unsubHistory = onSnapshot(historyCol, (snapshot) => {
          const logs = snapshot.docs.map(doc => ({
            docId: doc.id,
            ...doc.data()
          })).sort((a, b) => (b.id || 0) - (a.id || 0)); // Sortir terbaru di atas
          
          setHistoryLog(logs);
          console.log("Riwayat Sync Berhasil:", logs.length, "item");
        }, (err) => {
          console.error("History Error:", err);
        });

        // --- ATURAN CLEANUP (WAJIB) ---
        return () => {
          unsubConfig();
          unsubSchedules();
          unsubHistory(); // Pastikan history juga di-unsub
        };
      }, [user, appId]);

      // Login Persistence
      useEffect(() => {
        if (authorizedProdi) sessionStorage.setItem(AUTH_SESSION_KEY, authorizedProdi);
        else sessionStorage.removeItem(AUTH_SESSION_KEY);
      }, [authorizedProdi]);

      useEffect(() => { if (selectedProdi) localStorage.setItem(PRODI_KEY, selectedProdi); }, [selectedProdi]);
      useEffect(() => { if (toast) { const timer = setTimeout(() => setToast(null), 3500); return () => clearTimeout(timer); } }, [toast]);
      useEffect(() => { 
        localStorage.setItem(THEME_KEY, isDarkMode);
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [isDarkMode]);

      // --- STATS CALCULATOR ---
      const stats = useMemo(() => {
        const filtered = schedules.filter(s => s.prodi === selectedProdi);
        return {
          totalMatkul: filtered.length,
          totalDosen: [...new Set(filtered.map(s => s.dosen))].length,
          totalRuang: [...new Set(filtered.map(s => s.ruangan))].length
        };
      }, [schedules, selectedProdi]);

      // --- CLOUD WRITE HELPER ---
      const saveToCloud = async (colName, docId, data) => {
        if (!user) {
          setToast("Sistem sedang menghubungkan ke Cloud...");
          return;
        }
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', colName, String(docId));
          await setDoc(docRef, data);
        } catch (e) {
          console.error("Cloud Save Error:", e);
          setToast("Gagal sinkronisasi data ke Cloud.");
        }
      };

      const deleteFromCloud = async (colName, docId) => {
        if (!user) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', colName, String(docId));
          await deleteDoc(docRef);
        } catch (e) {
          console.error("Cloud Delete Error:", e);
          setToast("Gagal menghapus data.");
        }
      };

      // --- CLEAR ALL DATA (SUPER ADMIN) ---
      const handleClearAll = async () => {
        if (authorizedProdi !== 'SUPER_ADMIN') return;
        showConfirm(
          "Hapus Seluruh Database?",
          "PERHATIAN: Tindakan ini akan menghapus seluruh jadwal dari semua program studi secara permanen di Cloud.",
          async () => {
            const batch = writeBatch(db);
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'schedules'));
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            setToast("Database Berhasil Dibersihkan.");
          }
        );
      };

      // --- EXPORT TO EXCEL ---
      const downloadExcel = () => {
        if (filteredSchedules.length === 0) {
          return setToast("⚠️ Tidak ada data untuk diunduh pada prodi ini");
        }
        
        // Fungsi pembantu untuk mengambil nilai dari berbagai kemungkinan nama kunci (key)
        const getValue = (obj, keys) => {
          for (const key of keys) {
            if (obj[key] !== undefined && obj[key] !== null && obj[key] !== "") {
              return obj[key];
            }
          }
          return "-";
        };

        // Mapping data agar urutan kolom sesuai dengan format asli + Update Terakhir
        const dataForExcel = filteredSchedules.map(s => ({
          "Kode Matkul": getValue(s, ["kode_matkul", "Kode Matkul", "KODE MATKUL", "kodematkul"]),
          "Nama Matkul": getValue(s, ["matkul", "Nama Matkul", "nama_matkul", "Nama matkul"]),
          "SKS": getValue(s, ["sks", "SKS"]),
          "Semester": getValue(s, ["semester", "Semester", "SMT"]),
          "Dosen Pengampu": getValue(s, ["dosen", "Dosen Pengampu", "dosen_pengampu", "Dosen"]),
          "Hari": getValue(s, ["hari", "Hari"]),
          "Waktu": getValue(s, ["waktu", "Waktu", "Jam"]),
          "Kelas": getValue(s, ["kelas", "Kelas", "Kls"]),
          "Ruangan": getValue(s, ["ruangan", "Ruangan", "Ruang", "R."]),
          "Program Studi": getValue(s, ["prodi", "Program Studi", "program_studi"]),
          "Fakultas": getValue(s, ["fakultas", "Fakultas", "FAKULTAS"]),
          "Keterangan": getValue(s, ["keterangan", "Keterangan"]) === "-" ? "Reguler" : getValue(s, ["keterangan", "Keterangan"]),
          // Kolom tambahan untuk melacak riwayat perubahan (swap/move)
          "Update Terakhir": s.keterangan_rapat && s.keterangan_rapat !== "-" 
            ? s.keterangan_rapat 
            : "Belum ada perubahan"
        }));

        // Proses konversi ke file Excel menggunakan library XLSX
        const ws = XLSX.utils.json_to_sheet(dataForExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Jadwal_Perkuliahan");
        
        // Atur lebar kolom otomatis agar rapi
        const wscols = [
          {wch: 15}, {wch: 40}, {wch: 5}, {wch: 10}, {wch: 30}, 
          {wch: 12}, {wch: 18}, {wch: 12}, {wch: 12}, {wch: 25}, 
          {wch: 20}, {wch: 15}, {wch: 65}
        ];
        ws['!cols'] = wscols;

        // Penamaan file otomatis: Jadwal_[NamaProdi]_Genap_25_26.xlsx
        const fileName = `Jadwal_${selectedProdi.replace(/\s/g, '_')}_Genap_25_26.xlsx`;
        
        try {
          XLSX.writeFile(wb, fileName);
          setToast("✅ Excel Berhasil Diunduh (Format Lengkap)");
        } catch (err) {
          setToast("❌ Gagal mengunduh file Excel");
          console.error("Excel Error:", err);
        }
      };

      const handleLogin = () => {
        const targetMap = cloudPasscodeMap || {}; 
        const prodiMatch = targetMap[loginModal.passcode];
        
        if (prodiMatch) {
          setAuthorizedProdi(prodiMatch);
          if (prodiMatch !== 'SUPER_ADMIN') setSelectedProdi(prodiMatch); 
          setLoginModal({ open: false, passcode: '', error: '' });
          setToast(`Login Berhasil!`);
        } else {
          setToast("❌ Passcode tidak terdaftar!");
        }
      };

      const handleAdminUpdatePasscode = async () => {
        if (!adminEditData.prodi || adminEditData.newCode.length < 4) {
          return setToast("⚠️ Passcode baru minimal 4 karakter!");
        }

        const updatedMap = { ...cloudPasscodeMap };
        const oldKey = Object.keys(updatedMap).find(k => updatedMap[k] === adminEditData.prodi);
        if (oldKey) delete updatedMap[oldKey];
        updatedMap[adminEditData.newCode] = adminEditData.prodi;

        try {
          const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'passcodes');
          await setDoc(configRef, { 
            map: updatedMap, 
            updatedAt: new Date().toISOString(),
            lastEditor: "SUPER_ADMIN" 
          });
          
          setToast(`✅ Passcode ${adminEditData.prodi} diperbarui!`);
          setShowAdminEditModal(false);
        } catch (e) {
          setToast("❌ Gagal update ke Cloud.");
        }
      };

      const handleChangePasscode = async () => {
        if (!authorizedProdi || !cloudPasscodeMap) return;
        if (newPasscodeData.new.length < 4) return setToast("⚠️ Passcode baru minimal 4 karakter!");

        const updatedMap = { ...cloudPasscodeMap };
        
        // Cari kunci (passcode) lama yang saat ini digunakan prodi ini
        const oldKey = Object.keys(updatedMap).find(k => updatedMap[k] === authorizedProdi);

        // Verifikasi passcode lama (Kecuali Super Admin bisa bypass jika perlu, 
        // tapi di sini kita wajibkan demi keamanan)
        if (authorizedProdi !== 'SUPER_ADMIN' && newPasscodeData.old !== oldKey) {
          return setToast("❌ Passcode lama salah!");
        }

        // Proses Tukar Kunci: Hapus yang lama, masukkan yang baru
        delete updatedMap[oldKey];
        updatedMap[newPasscodeData.new] = authorizedProdi;

        try {
          const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'passcodes');
          await setDoc(configRef, { 
            map: updatedMap, 
            updatedAt: new Date().toISOString(),
            lastEditor: authorizedProdi 
          });
          
          setToast("✅ Passcode Berhasil Diperbarui di Cloud!");
          setShowPasswordModal(false);
          setNewPasscodeData({ old: '', new: '' });
        } catch (e) {
          console.error(e);
          setToast("❌ Gagal menyimpan ke Cloud.");
        }
      };


      const handleLogout = () => {
        setAuthorizedProdi(null);
        setActiveMenu('dashboard');
        setToast("Berhasil Logout.");
      };

      const handleSelectAllHistory = () => {
        // Memastikan data yang dipilih hanya yang muncul di layar (sesuai hak akses role)
        const accessibleHistory = historyLog.filter(log => 
          authorizedProdi === 'SUPER_ADMIN' || log.prodi === authorizedProdi
        );
        
        if (accessibleHistory.length === 0) return;

        const allIds = accessibleHistory.map(log => log.id);

        // Toggle: Jika sudah terpilih semua, lepas semua. Jika belum, pilih semua.
        if (selectedHistoryIds.length === allIds.length && allIds.length > 0) {
          setSelectedHistoryIds([]);
        } else {
          setSelectedHistoryIds(allIds);
        }
      };

      // --- IMPROVED EXCEL PROCESSOR (FIXED FOR 1285 DATA) ---
      const processFile = async (file) => {
        if (authorizedProdi !== 'SUPER_ADMIN') {
          setToast("🔐 Hanya Super Admin yang boleh upload!");
          return;
        }
        if (!file) return;

        setToast("⏳ Membaca file Excel...");
        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            console.log("File read success. Parsing data...");
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const wsName = wb.SheetNames[0];
            const ws = wb.Sheets[wsName];
            const rawData = XLSX.utils.sheet_to_json(ws);
            
            console.log("Total rows found in Excel:", rawData.length);
            if (!rawData || rawData.length === 0) {
              setToast("❌ File Excel kosong atau format salah.");
              return;
            }

            let count = 0;
            let currentBatch = writeBatch(db);
            let opCount = 0;
            let prodiMismatch = 0;

            for (let i = 0; i < rawData.length; i++) {
              const row = rawData[i];
              
              const getVal = (keys) => {
                for (let k of keys) {
                  if (row[k] !== undefined) return String(row[k]).trim();
                }
                return null;
              };

              const prodiVal = getVal(['Program Studi', 'ProgramStudi', 'PRODI', 'PROGRAM STUDI', 'Prodi']);
              const matkulVal = getVal(['Nama Matkul', 'MATAKULIAH', 'NAMA MATKUL', 'Matakuliah']);
              const kodeVal = getVal(['Kode Matkul', 'KODE', 'ID', 'KODE MATKUL', 'Kode']);
              const kelasVal = getVal(['Kelas', 'KELAS']) || '-';
              
              if (!prodiVal || !matkulVal) continue;

              const isMatch = (authorizedProdi === 'SUPER_ADMIN') || 
                              (prodiVal.toLowerCase().includes(authorizedProdi.toLowerCase())) ||
                              (authorizedProdi.toLowerCase().includes(prodiVal.toLowerCase()));
              
              if (isMatch) {
                const rawId = kodeVal || `gen-${Date.now()}`;
                const sanitizedBaseId = rawId.replace(/[\/\.\#\$\[\]]/g, '-');
                const finalId = `${sanitizedBaseId}-${kelasVal.replace(/[\/\.\#\$\[\]]/g, '-')}-${i}`;

                const item = {
                  id: finalId,
                  matkul: matkulVal,
                  dosen: getVal(['Dosen Pengampu', 'DOSEN', 'DOSEN PENGAMPU', 'Dosen']) || 'TBA',
                  hari: getVal(['Hari', 'HARI']) || 'Senin',
                  waktu: getVal(['Waktu', 'WAKTU']) || '-',
                  ruangan: getVal(['Ruangan', 'RUANGAN']) || '-',
                  prodi: prodiVal,
                  kelas: kelasVal,
                  sks: getVal(['SKS', 'sks']) || '0',
                  semester: getVal(['Semester', 'SEMESTER']) || '0',
                  keterangan_rapat: '-'
                };
                
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', item.id);
                currentBatch.set(docRef, item);
                count++;
                opCount++;

                if (opCount >= 450) {
                  await currentBatch.commit();
                  currentBatch = writeBatch(db);
                  opCount = 0;
                }
              } else {
                prodiMismatch++;
              }
            }
            
            if (opCount > 0) {
              await currentBatch.commit();
            }

            console.log(`Summary: ${count} imported, ${prodiMismatch} skipped.`);
            if (count > 0) {
              setToast(`✅ Berhasil! ${count} jadwal disinkronkan ke Cloud.`);
            } else if (prodiMismatch > 0) {
              setToast(`⚠️ Prodi di Excel tidak cocok dengan login Anda.`);
            } else {
              setToast("❌ Format kolom Excel tidak dikenali.");
            }
            
            if (fileInputRef.current) fileInputRef.current.value = "";
          } catch (err) { 
            console.error("Excel Processor Error:", err);
            setToast("❌ Gagal simpan ke Cloud: " + (err.message || "Error")); 
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleFileUpload = (e) => processFile(e.target.files[0]);
      const handleDrag = (e) => { e.preventDefault(); e.stopPropagation(); if (authorizedProdi && (e.type === "dragenter" || e.type === "dragover")) setDragActive(true); else if (e.type === "dragleave") setDragActive(false); };
      const handleDrop = (e) => { e.preventDefault(); e.stopPropagation(); setDragActive(false); if (authorizedProdi && e.dataTransfer.files && e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); };

      const handleSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
        setSortConfig({ key, direction });
      };

      const filteredSchedules = useMemo(() => {
        let base = schedules.filter(s => s.prodi === selectedProdi);
        if (searchTerm) {
          const q = searchTerm.toLowerCase();
          base = base.filter(s => 
            s.matkul.toLowerCase().includes(q) || s.dosen.toLowerCase().includes(q) ||
            s.ruangan.toLowerCase().includes(q) || s.hari.toLowerCase().includes(q) ||
            s.kelas.toLowerCase().includes(q) || s.waktu.toLowerCase().includes(q)
          );
        }
        if (sortConfig.key === 'hari') return sortSchedulesByDay(base, sortConfig.direction);
        return base.sort((a, b) => {
          const valA = String(a[sortConfig.key] || "").toLowerCase();
          const valB = String(b[sortConfig.key] || "").toLowerCase();
          if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
          if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
          return 0;
        });
      }, [schedules, selectedProdi, searchTerm, sortConfig]);

      const scannerData = useMemo(() => {
        const isAllDay = scanConfig.waktu === "Semua Jam";
        const allRooms = [...new Set(schedules.map(s => s.ruangan.trim()))]
          .filter(r => r && r !== '-' && !r.toLowerCase().includes('online'))
          .sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));
          
        const targetDays = schedules.filter(s => s.hari.trim().toLowerCase() === scanConfig.hari.trim().toLowerCase());
        const slotsToCheck = isAllDay ? TIMES_SLOTS : [scanConfig.waktu];
        const availableResults = [];
        const occupiedResults = [];

        slotsToCheck.forEach(slot => {
          const range = getSlotRange(slot);
          allRooms.forEach(room => {
            const match = targetDays.find(s => s.ruangan.trim() === room && s.waktu.trim() === slot);
            if (match) {
              occupiedResults.push(match);
            } else {
              const hasOverlap = targetDays.some(s => s.ruangan.trim() === room && isOverlap(range, getSlotRange(s.waktu)));
              if (!hasOverlap) availableResults.push({ room, time: slot });
            }
          });
        });

        let filteredOccupied = occupiedResults;
        if (occupiedSearch) {
          const q = occupiedSearch.toLowerCase();
          filteredOccupied = filteredOccupied.filter(s => 
            s.ruangan.toLowerCase().includes(q) || s.matkul.toLowerCase().includes(q) || s.dosen.toLowerCase().includes(q) || s.prodi.toLowerCase().includes(q)
          );
        }
        return { free: availableResults, occupied: filteredOccupied };
      }, [schedules, scanConfig, occupiedSearch]);

      const swapSafeCandidates = useMemo(() => {
        if (!swapMatkulAsal || !authorizedProdi) return [];
        const prodiToManage = authorizedProdi === 'SUPER_ADMIN' ? swapMatkulAsal.prodi : authorizedProdi;
        const lecturerAsalNorm = swapDosenAsal.toLowerCase().trim();
        const timeAsal = getSlotRange(swapMatkulAsal.waktu);
        const dayAsalNorm = swapMatkulAsal.hari.toLowerCase().trim();
        const classAsalNorm = swapMatkulAsal.kelas.toLowerCase().trim();

        let candidates = schedules.filter(target => 
          target.prodi === prodiToManage && target.id !== swapMatkulAsal.id && (target.waktu && target.waktu !== '-')
        ).filter(target => {
          const timeTuj = getSlotRange(target.waktu);
          const dayTujNorm = target.hari.toLowerCase().trim();
          const lecturerTujNorm = target.dosen.toLowerCase().trim();
          const classTujNorm = target.kelas.toLowerCase().trim();

          const b1 = (timeTuj && dayTujNorm) ? schedules.some(s => s.id !== swapMatkulAsal.id && s.id !== target.id && s.dosen.toLowerCase().trim() === lecturerAsalNorm && s.hari.toLowerCase().trim() === dayTujNorm && isOverlap(timeTuj, getSlotRange(s.waktu))) : false;
          const b2 = (timeAsal && dayAsalNorm) ? schedules.some(s => s.id !== swapMatkulAsal.id && s.id !== target.id && s.dosen.toLowerCase().trim() === lecturerTujNorm && s.hari.toLowerCase().trim() === dayAsalNorm && isOverlap(timeAsal, getSlotRange(s.waktu))) : false;
          const b3 = (timeTuj && dayTujNorm) ? schedules.some(s => s.id !== swapMatkulAsal.id && s.id !== target.id && s.kelas.toLowerCase().trim() === classAsalNorm && s.hari.toLowerCase().trim() === dayTujNorm && isOverlap(timeTuj, getSlotRange(s.waktu))) : false;
          const b4 = (timeAsal && dayAsalNorm) ? schedules.some(s => s.id !== swapMatkulAsal.id && s.id !== target.id && s.kelas.toLowerCase().trim() === classTujNorm && s.hari.toLowerCase().trim() === dayAsalNorm && isOverlap(timeAsal, getSlotRange(s.waktu))) : false;
          
          return !b1 && !b2 && !b3 && !b4;
        });

        if (swapDayFilter !== 'Semua') {
          candidates = candidates.filter(c => c.hari.trim().toLowerCase() === swapDayFilter.toLowerCase());
        }
        return sortSchedulesByDay(candidates, 'asc');
      }, [swapMatkulAsal, schedules, authorizedProdi, swapDosenAsal, swapDayFilter]);

      // 1. Perbaikan Logic (useMemo)
      const moveOptions = useMemo(() => {
        if (!swapMatkulAsal) return [];
        const allRooms = [...new Set(schedules.map(s => s.ruangan.trim()))].filter(r => r && r !== '-' && !r.toLowerCase().includes('online'));
        
        // Filter jadwal HANYA pada hari yang dipilih di UI (swapTargetDay)
        const targetDaySchedules = schedules.filter(s => s.hari.trim().toLowerCase() === swapTargetDay.trim().toLowerCase());
        
        const options = [];
        const lecturerAsalNorm = swapDosenAsal.toLowerCase().trim();
        const classAsalNorm = swapMatkulAsal.kelas.toLowerCase().trim();

        TIMES_SLOTS.forEach(jam => {
          const rangeJam = getSlotRange(jam);
          if (targetDaySchedules.some(s => s.dosen.toLowerCase().trim() === lecturerAsalNorm && isOverlap(rangeJam, getSlotRange(s.waktu)))) return;
          if (targetDaySchedules.some(s => s.kelas.toLowerCase().trim() === classAsalNorm && isOverlap(rangeJam, getSlotRange(s.waktu)))) return;
          
          allRooms.forEach(rm => {
            if (!targetDaySchedules.some(s => s.ruangan.trim() === rm && isOverlap(rangeJam, getSlotRange(s.waktu)))) {
              options.push({ hari: swapTargetDay, waktu: jam, ruangan: rm });
            }
          });
        });
        return options;
      }, [swapMatkulAsal, swapTargetDay, schedules, swapDosenAsal]); // Pastikan swapTargetDay masuk dependency

      // 2. Perbaikan UI Filter Hari (Gunakan onClick untuk setSwapTargetDay)
      {DAYS_ORDER.map(day => (
        <button 
          key={day} 
          onClick={() => setSwapTargetDay(day)} 
          className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase ${swapTargetDay === day ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}`}
        >
          {day}
        </button>
      ))}

      const showConfirm = (title, message, onConfirm) => {
        setConfirmDialog({ open: true, title, message, onConfirm });
      };

      const executeSwap = (rowTuj) => {
        if (!authorizedProdi || !swapReason.trim()) return;
        showConfirm("Konfirmasi Swap", `Tukar jadwal [${swapMatkulAsal.matkul}] dengan [${rowTuj.matkul}]?`, async () => {
          const ts = new Date().toLocaleString('id-ID');
          // Format Keterangan Informatif (Poin 1)
          const ketInformatif = `[NOTULIS: ${adminName}] ALASAN: ${swapReason}. ` +
          `DOSEN ASAL: ${swapDosenAsal} (${swapMatkulAsal.hari}, ${swapMatkulAsal.waktu}, R:${swapMatkulAsal.ruangan}) ` +
          `<=> DOSEN TUJUAN: ${rowTuj.dosen} (${rowTuj.hari}, ${rowTuj.waktu}, R:${rowTuj.ruangan})`;

          const newHistory = {
            id: Date.now(),
            type: 'SWAP', admin: authorizedProdi, timestamp: ts, reason: swapReason, prodi: swapMatkulAsal.prodi,
            affected: [
              { id: swapMatkulAsal.id, matkul: swapMatkulAsal.matkul, before: { ...swapMatkulAsal }, after: { ...swapMatkulAsal, hari: rowTuj.hari, waktu: rowTuj.waktu, ruangan: rowTuj.ruangan, keterangan_rapat: ketInformatif } },
              { id: rowTuj.id, matkul: rowTuj.matkul, before: { ...rowTuj }, after: { ...rowTuj, hari: swapMatkulAsal.hari, waktu: swapMatkulAsal.waktu, ruangan: swapMatkulAsal.ruangan, keterangan_rapat: ketInformatif } }
            ]
          };
          await saveToCloud('schedules', swapMatkulAsal.id, newHistory.affected[0].after);
          await saveToCloud('schedules', rowTuj.id, newHistory.affected[1].after);
          await saveToCloud('history', newHistory.id, newHistory);
          setToast("Jadwal Berhasil Ditukar!"); resetSwapFlow();
        });
      };

      const executeMove = (slot) => {
        if (!authorizedProdi || !swapReason.trim()) return;
        
        const dosenAsal = swapDosenAsal || swapMatkulAsal.dosen || "TBA";
        const kelasAsal = swapMatkulAsal.kelas || "-";
        
        showConfirm(
          "Konfirmasi Pindah Jadwal", 
          `Pindahkan [${swapMatkulAsal.matkul}] ke hari ${slot.hari} pukul ${slot.waktu} di Ruang ${slot.ruangan}?`, 
          async () => {
            const ts = new Date().toLocaleString('id-ID');
            
            // Update baris ini: Menambahkan label semester ke log keterangan
            const ketInformatif = `[NOTULIS: ${adminName}] [SMT GENAP 25/26] ALASAN: ${swapReason}. ` +
              `PINDAH: ${dosenAsal} (Kls: ${kelasAsal}, ${swapMatkulAsal.hari}, ${swapMatkulAsal.waktu}, R:${swapMatkulAsal.ruangan}) ` +
              `-> KE: (${slot.hari}, ${slot.waktu}, R:${slot.ruangan})`;

            const newHistory = {
              id: Date.now(),
              type: 'MOVE',
              admin: authorizedProdi,
              timestamp: ts,
              reason: swapReason,
              prodi: swapMatkulAsal.prodi,
              affected: [
                { 
                  id: swapMatkulAsal.id, 
                  matkul: swapMatkulAsal.matkul, 
                  before: { ...swapMatkulAsal }, 
                  after: { ...swapMatkulAsal, hari: slot.hari, waktu: slot.waktu, ruangan: slot.ruangan, keterangan_rapat: ketInformatif } 
                }
              ]
            };

            await saveToCloud('schedules', swapMatkulAsal.id, newHistory.affected[0].after);
            await saveToCloud('history', newHistory.id, newHistory);
            
            setToast("Jadwal Berhasil Dipindahkan!");
            resetSwapFlow();
          }
        );
      };

      const handleAddManual = async () => {
        if (authorizedProdi !== 'SUPER_ADMIN') return;
        
        // Validasi kolom wajib
        if (!formData.matkul || !formData.ruangan || !formData.dosen || !formData.prodi || !formData.kode_matkul) {
          return setToast("⚠️ Kode Matkul, Nama Matkul, Dosen, Ruangan, dan Prodi wajib diisi!");
        }
        
        const manualId = `manual-${Date.now()}`;
        const newItem = { 
          ...formData, 
          id: manualId, 
          keterangan_rapat: `[INPUT MANUAL] ditambahkan pada ${new Date().toLocaleString('id-ID')}` 
        };

        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', manualId), newItem);
          setToast("✅ Jadwal berhasil ditambahkan ke Cloud!");
          setShowAddModal(false);
          
          // Reset Form ke default
          setFormData({ 
            kode_matkul: '', matkul: '', sks: '2', semester: '2', dosen: '', 
            hari: 'Senin', waktu: '07:00-08:40', kelas: '', ruangan: '', 
            prodi: '', fakultas: '', keterangan: 'Reguler' 
          });
        } catch (err) {
          console.error(err);
          setToast("❌ Gagal menyimpan.");
        }
      };


      const executeMultiUndo = async () => {
        if (!authorizedProdi) return;
        if (selectedHistoryIds.length === 0) return;
        showConfirm(
          "Multi Undo",
          `Apakah Anda yakin ingin membatalkan ${selectedHistoryIds.length} perubahan terpilih?`,
          async () => {
             const sortedSelection = [...selectedHistoryIds].sort((a, b) => b - a);
             for (const id of sortedSelection) {
                const item = historyLog.find(h => h.id === id);
                if (item && (authorizedProdi === 'SUPER_ADMIN' || item.prodi === authorizedProdi)) {
                   for (const aff of item.affected) {
                      await saveToCloud('schedules', aff.id, aff.before);
                   }
                   await deleteFromCloud('history', id);
                }
             }
             setSelectedHistoryIds([]);
             setToast("Perubahan Berhasil Dibatalkan dari Cloud.");
          }
        );
      };

      const undoAction = async (historyId) => { 
        if (!authorizedProdi) return;
        showConfirm(
          "Batalkan Perubahan (Undo)",
          "Apakah Anda yakin ingin mengembalikan jadwal ini ke posisi semula di Cloud?",
          async () => {
            const item = historyLog.find(h => h.id === historyId); 
            if (item) {
               for (const aff of item.affected) {
                  await saveToCloud('schedules', aff.id, aff.before);
               }
               await deleteFromCloud('history', historyId);
               setToast("Sinkronisasi Undo Berhasil.");
            }
          }
        );
      };

      const toggleHistorySelection = (id) => {
         if (!authorizedProdi) return;
         setSelectedHistoryIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
      };

      const resetSwapFlow = () => { setSwapMode('menu'); setSwapStep(1); setSwapDosenAsal(null); setSwapMatkulAsal(null); setSwapReason(''); setSwapDayFilter('Semua'); };
      const handleStepBack = () => { if (swapStep > 1) setSwapStep(swapStep - 1); else setSwapMode('menu'); };

      const SortButton = ({ label, sortKey }) => {
        const isActive = sortConfig.key === sortKey;
        return (
          <button onClick={() => handleSort(sortKey)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all border ${isActive ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-blue-300'}`}>
            {label} {isActive ? (sortConfig.direction === 'asc' ? <SortAsc size={12} /> : <SortDesc size={12} />) : <ArrowUpDown size={12} className="opacity-30" />}
          </button>
        );
      };

      const parseDashboardLog = (fullLog) => {
         if (!fullLog || fullLog === '-') return null;
         const asalMatch = fullLog.match(/\(Asal: .*?\)/);
         return asalMatch ? asalMatch[0] : fullLog;
      };

      const cloudProdiList = useMemo(() => {
        return [...new Set(schedules.map(s => s.prodi))].filter(p => p).sort();
      }, [schedules]);

      return (
        <div 
          onDragEnter={handleDrag}
          className={`flex h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans overflow-hidden transition-colors duration-300`}
        >
          {/* DRAG OVERLAY */}
          {dragActive && authorizedProdi && (
            <div 
              onDragEnter={handleDrag} onDragLeave={handleDrag} onDragOver={handleDrag} onDrop={handleDrop}
              className="fixed inset-0 z-[300] bg-blue-600/20 backdrop-blur-md flex flex-col items-center justify-center p-10 animate-in"
            >
               <div className="w-full max-w-2xl border-4 border-dashed border-blue-600 rounded-[4rem] bg-white/80 dark:bg-slate-900/80 p-5 sm:p-20 flex flex-col items-center justify-center text-center shadow-2xl">
                  <div className="bg-blue-600 p-8 rounded-[2.5rem] text-white shadow-2xl animate-bounce-slow mb-8">
                     <UploadCloud size={64} />
                  </div>
                  <h2 className="text-2xl sm:text-4xl font-black text-slate-800 dark:text-white uppercase tracking-tighter mb-4">Lepaskan File Excel</h2>
                  <p className="text-slate-500 font-bold uppercase tracking-widest text-xs sm:text-sm">
                    {authorizedProdi === 'SUPER_ADMIN' ? 'Update Seluruh Database Induk' : `Update Jadwal ${authorizedProdi}`}
                  </p>
               </div>
            </div>
          )}

          {/* LOGIN MODAL */}
          {loginModal.open && (
            <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-md animate-in">
                <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] shadow-2xl border dark:border-slate-800 p-8 sm:p-10 animate-scale-in">
                   <div className="flex flex-col items-center text-center mb-8">
                      <div className="bg-blue-600 p-4 rounded-3xl text-white mb-4 shadow-lg"><Lock size={32}/></div>
                      <h3 className="text-2xl font-black text-slate-800 dark:text-white uppercase leading-tight">Portal Kaprodi</h3>
                      <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-2">Masukan Passcode Prodi</p>
                   </div>
                   <div className="space-y-4">
                      <input 
                        type="password" autoFocus 
                        value={loginModal.passcode} 
                        onChange={(e) => setLoginModal({...loginModal, passcode: e.target.value})} 
                        onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                        className="w-full bg-slate-100 dark:bg-slate-800 border-2 border-transparent focus:border-blue-600 px-6 py-4 rounded-2xl text-center font-black tracking-[1em] outline-none text-blue-600" 
                        placeholder="••••••" 
                      />
                      {loginModal.error && <p className="text-red-500 text-[10px] font-black uppercase text-center">{loginModal.error}</p>}
                      <button onClick={handleLogin} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-xl hover:opacity-90 transition-all">Verifikasi</button>
                      <button onClick={() => setLoginModal({open: false, passcode: '', error: ''})} className="w-full py-3 text-slate-400 font-black text-[10px] uppercase">Tutup</button>
                   </div>
                </div>
            </div>
          )}

          {/* IMPROVED TOAST: Fixed cutting off issue */}
          {toast && (
            <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[10000] animate-in w-auto max-w-[90vw]">
              <div className="bg-slate-900 dark:bg-blue-600 text-white px-5 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10 backdrop-blur-md">
                <BellRing size={18} className="shrink-0 text-blue-200 dark:text-white/80"/>
                <p className="text-[10px] sm:text-xs font-black uppercase tracking-widest leading-relaxed break-words">
                  {toast}
                </p>
              </div>
            </div>
          )}

          {/* ... baris terakhir konten/toast Anda ... */}
          {toast && (
            <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[10000] bg-slate-900 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-2xl">{toast}</div>
          )}

          {/* MODAL UBAH PASSWORD - TEMPELKAN DI SINI */}
          {showPasswordModal && (
            <div className="fixed inset-0 z-[800] flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-md animate-in">
              <div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] shadow-2xl border dark:border-slate-800 p-8 animate-scale-in">
                <div className="flex flex-col items-center text-center mb-6">
                  <div className="bg-blue-600 p-4 rounded-3xl text-white mb-4 shadow-lg">
                    <Lock size={32} />
                  </div>

                    </div>

                    <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Passcode Baru (Min. 4 Karakter)</label>

                      value={newPasscodeData.new}
                      onChange={(e) => setNewPasscodeData({...newPasscodeData, new: e.target.value})}
                      className="w-full bg-slate-50 dark:bg-slate-800 border-none px-5 py-3 rounded-xl font-bold dark:text-white outline-none focus:ring-2 focus:ring-blue-600"

                    />
                  </div>
                  
                  <div className="flex flex-col gap-2 pt-4">
                    <button

                        setShowPasswordModal(false);
                        setNewPasscodeData({old: '', new: ''});

                    </button>
                  </div>
                </div>

                   <p className="text-slate-500 dark:text-slate-400 font-bold text-xs sm:text-sm leading-relaxed mb-8 uppercase tracking-tight">{confirmDialog.message}</p>

                      <button onClick={() => setConfirmDialog({...confirmDialog, open: false})} className="flex-1 py-3.5 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-2xl font-black text-[10px] uppercase transition-all order-2 sm:order-1">Batal</button>

                </div>

                    <h3 className="text-xl font-black text-slate-800 dark:text-white uppercase tracking-tighter">Input Jadwal Manual</h3>

                    <div className="md:col-span-2 space-y-1">

                    </div>
                  </div>

                  {/* Baris 2: Dosen & Fakultas */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                      <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Fakultas</label>

                          <option key={p} value={p}>{p}</option>

                  </div>

                      <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Hari</label>

                    <div>

                    <div>
                      <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Kelas</label>

                    </div>
                    <div>
                      <label className="text-[9px] font-black text-slate-400 uppercase ml-2">SKS</label>

                    <div>

                  </div>

                    <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Keterangan Tambahan</label>

                  </div>

                  <button onClick={handleAddManual} className="w-full py-4 bg-emerald-600 text-white rounded-[1.5rem] font-black uppercase shadow-lg shadow-emerald-500/20 mt-4 hover:bg-emerald-700 transition-all">
                    Simpan Jadwal ke Cloud
                  </button>
                </div>
              </div>
            </div>

          {isSidebarOpen && window.innerWidth <= 1024 && (
            <div

                <div className="overflow-hidden">
                  <h1 className="font-black text-xs md:text-sm lg:text-lg uppercase tracking-tighter leading-tight dark:text-white break-words">

                  </h1>
                  <p className="text-[10px] font-bold text-blue-500 uppercase tracking-widest mt-1">Cloud Edition - Semester Genap 2025/2026</p>
                </div>
              )}
              <button onClick={() => setSidebarOpen(false)} className="lg:hidden absolute right-4 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-red-500"><X size={20}/></button>
            </div>

            <div className="flex-1 flex flex-col overflow-y-auto custom-scrollbar">
              {isSidebarOpen && (
                <div className="p-4 space-y-3 border-b dark:border-slate-800">
                  <div className="space-y-1">
                    <div className="flex justify-between items-center px-2">
                       <label className="text-[9px] font-black text-slate-400 uppercase">Program Studi:</label>
                       {isLoadingData && <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>}
                    </div>
                    <select 
                        disabled={(authorizedProdi && authorizedProdi !== 'SUPER_ADMIN') || isLoadingData} 
                        value={selectedProdi} 
                        onChange={(e) => setSelectedProdi(e.target.value)} 
                        className="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-3 rounded-2xl text-xs font-bold outline-none cursor-pointer dark:text-slate-200 disabled:opacity-50 appearance-none"
                    >
                      {cloudProdiList.length > 0 ? (
                        cloudProdiList.map(p => <option key={p} value={p}>{p}</option>)
                      ) : (
                        <option disabled>Menunggu data Cloud...</option>
                      )}
                    </select>
                  </div>
                </div>
              )}

              <nav className="p-4 space-y-2">
                {[
                  { id: 'dashboard', label: 'Dashboard Jadwal', icon: LayoutDashboard, public: true },
                  { id: 'scanner', label: 'Cari Ruang Kosong', icon: SearchCode, public: false },
                  { id: 'swap', label: 'Tukar & Pindah', icon: RefreshCw, public: false },
                  { id: 'history', label: 'Riwayat & Berita', icon: FileText, public: false }
                ].filter(item => item.public || authorizedProdi).map((item) => (
                  <button 
                    key={item.id} 
                    onClick={() => { setActiveMenu(item.id); resetSwapFlow(); if (window.innerWidth <= 1024) setSidebarOpen(false); }} 
                    className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm transition-all ${activeMenu === item.id ? 'bg-blue-600 text-white shadow-xl shadow-blue-500/20' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800/50'}`}
                  >
                    <item.icon size={20} className="shrink-0" />
                    {(isSidebarOpen || window.innerWidth <= 1024) && <span className="flex-1 text-left truncate">{item.label}</span>}
                  </button>
                ))}
              </nav>
            </div>

            <div className="p-4 border-t dark:border-slate-800">

                    <>
                      <div className="flex items-center gap-3 mb-4 overflow-hidden">
                        <div className={`w-10 h-10 rounded-2xl flex items-center justify-center text-white shadow-lg shrink-0 ${authorizedProdi === 'SUPER_ADMIN' ? 'bg-orange-500' : 'bg-emerald-500'}`}>

                          <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate">{authorizedProdi === 'SUPER_ADMIN' ? 'Full Access' : 'Kaprodi Aktif'}</p>
                          <p className="text-sm font-black truncate dark:text-white uppercase leading-none">{authorizedProdi}</p>
                        </div>
                      </div>
                      {/* Tombol Ubah Password */}
                      <button 
                        onClick={() => setShowPasswordModal(true)}

                      </button>
                      <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 py-2.5 bg-red-50 dark:bg-red-500/10 rounded-xl text-[10px] font-black text-red-600 uppercase transition-all">
                        <LogOut size={14} /> Logout
                      </button>
                    </>

                    <button onClick={() => setLoginModal({...loginModal, open: true})} className="w-full flex items-center justify-center gap-3 py-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-xl hover:opacity-90 transition-all">
                      <Unlock size={16} /> Login Kaprodi
                    </button>
                    
                  )}
                </div>
              )}
            </div>
          </aside>

          <div className="flex-1 flex flex-col min-w-0 overflow-hidden">

              <div className="flex items-center gap-4 w-full lg:w-auto">
                <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="p-2.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all dark:text-slate-400"><Menu size={20} /></button>
                <div className="relative flex-1 lg:max-w-xs xl:max-w-md">
                  <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 dark:text-slate-600" size={18} />
                  <input type="text" placeholder="Cari matkul, dosen..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl pl-12 pr-4 py-2.5 text-sm font-medium outline-none dark:text-white dark:placeholder-slate-500" />
                </div>
              </div>

                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition-all shrink-0">
                  {isDarkMode ? <Sun size={18} /> : <Moon size={18} />}
                </button>

                    <button 
                      onClick={() => fileInputRef.current.click()} 
                      className="flex items-center gap-2 px-4 py-2.5 bg-slate-900 dark:bg-blue-600 text-white rounded-xl text-[10px] sm:text-xs font-black shadow-md shrink-0 transition-all hover:opacity-90"

                      <FileUp size={16} /> 
                      <span className="hidden sm:inline">Update Jadwal</span>
                      <span className="sm:hidden uppercase font-black">Excel</span>
                    </button>

                    <button 
                      onClick={() => setShowAddModal(true)} 
                      className="flex items-center gap-2 px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-[10px] sm:text-xs font-black shadow-md transition-all shrink-0"
                    >
                      <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                      <span>Tambah Manual</span>
                    </button>
                  </>
                )}

                <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx,.xls" onChange={handleFileUpload} />
              </div>
            </header>

            <main className="flex-1 overflow-y-auto p-4 lg:p-8 bg-slate-50/50 dark:bg-slate-950 custom-scrollbar main-content">

                <div className="no-print flex gap-3 sm:gap-6 mb-8">
                  <div className="flex-1 bg-white dark:bg-slate-900 p-4 rounded-3xl border dark:border-slate-800 shadow-sm">
                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Data Cloud</p>
                    <div className="flex items-center gap-2 mt-1">
                      <span className="text-xl font-black text-slate-800 dark:text-white">{totalCloudData}</span>
                      <span className="text-[8px] font-black text-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 px-2 py-0.5 rounded-lg uppercase">Database Aktif</span>
                    </div>
                  </div>

                  <div className="flex-1 bg-white dark:bg-slate-900 p-4 rounded-3xl border dark:border-slate-800 shadow-sm">
                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Status Sinkron</p>

                      <div className={`w-2 h-2 rounded-full ${syncStatus === 'Sinkron' ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}`}></div>
                      <span className="text-[10px] font-black text-slate-700 dark:text-slate-300 uppercase">{syncStatus}</span>
                    </div>
                  </div>
                </div>
                {isLoadingData ? (

                      <h2 className="text-lg sm:text-xl font-black text-slate-800 dark:text-white uppercase">Menghubungkan ke Cloud...</h2>

                      <button onClick={() => setIsLoadingData(false)} className="mt-8 px-6 py-2 bg-slate-200 dark:bg-slate-800 text-slate-500 rounded-xl text-[10px] font-black uppercase">Bypass Loading</button>

                    <div className="relative mb-10">
                       <div className="absolute -top-16 left-1/2 -translate-x-1/2 animate-bounce-slow text-blue-600 flex flex-col items-center gap-2">
                          <span className="text-[10px] font-black uppercase tracking-widest bg-blue-50 dark:bg-slate-800 px-3 py-1 rounded-full shadow-sm border dark:border-slate-700 whitespace-nowrap">Database Cloud Kosong</span>

                       </div>
                       <div className="w-24 h-24 sm:w-32 sm:h-32 lg:w-40 lg:h-40 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-[2rem] sm:rounded-[2.5rem] lg:rounded-[3.5rem] flex items-center justify-center shadow-inner border-4 border-white dark:border-slate-800 shrink-0"><UploadCloud size={64} /></div>

                    {activeMenu === 'dashboard' && (
